<body>

<div class="card">
    <h1>For Hanshika 🪷</h1>
    <p id="text"></p>
    <button id="btn" onclick="nextMessage()">Tap here 💌</button>
    <p id="extra" class="hidden"></p>
</div>

<audio id="music" loop>
  <source src="zulfe.mp3" type="audio/mpeg">
</audio>

<script>
const messages = [
    "I don’t know what’s on your mind…",
    "But I can feel something is a little off.",
    "You don’t have to explain anything.",
    "Just know… you matter a lot.",
    "And your smile? Yeah… it’s important 😊"
];

let index = 0;
const textEl = document.getElementById("text");
const btnEl = document.getElementById("btn");
const extraEl = document.getElementById("extra");
const music = document.getElementById("music");

function typeEffect(text, element) {
    element.innerHTML = "";
    let i = 0;
    btnEl.style.pointerEvents = "none";
    btnEl.style.opacity = "0.5";

    let timer = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) {
            clearInterval(timer);
            btnEl.style.pointerEvents = "auto";
            btnEl.style.opacity = "1";
        }
    }, 50);
}

typeEffect(messages[0], textEl);

function nextMessage() {
    if(index === 0) {
        music.play().catch(e => console.log("Audio play blocked"));
    }

    index++;
    if (index < messages.length) {
        typeEffect(messages[index], textEl);
    } else {
        textEl.style.display = "none";
        btnEl.style.display = "none";
        extraEl.classList.remove("hidden");
        // Added a lotus here too for the final touch
        extraEl.innerHTML = "I just didn’t like seeing you not smile 🪷";
    }
}

// Lotus and Heart floating effect
function createFloatingElement() {
    const el = document.createElement("div");
    el.className = "heart"; // Keeping class name for CSS consistency
    
    // Primary focus on the Lotus
    const symbols = ["🪷", "🪷", "💖", "✨", "🪷"]; 
    el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
    
    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = (Math.random() * 20 + 15) + "px";
    el.style.opacity = Math.random() * 0.6 + 0.4;
    el.style.animation = `floatUp ${Math.random() * 4 + 5}s linear forwards`;
    
    document.body.appendChild(el);

    setTimeout(() => { el.remove(); }, 7000);
}

setInterval(createFloatingElement, 450);
</script>

</body>
