<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Hanshika 🌸</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffe9f5);
    overflow: hidden;
    transition: opacity 1.5s;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    width: 320px;
}

h1 {
    color: #ff4d88;
}

p {
    color: #555;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #ff4d88;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* second scene */
#scene2 {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: blink 2s infinite;
}

@keyframes blink {
    0%,100% {opacity: 0.2;}
    50% {opacity: 1;}
}

/* glow text */
.glow {
    color: #ff4d88;
    text-shadow: 0 0 5px #ff4d88,
                 0 0 10px #ff4d88,
                 0 0 20px #ff85a2;
}
</style>

</head>

<body>

<div class="container" id="scene1">
    <div class="card">
        <h1>Hey Hanshika 🌸</h1>
        <p id="text"></p>
        <button onclick="nextMessage()">Tap here 💌</button>
    </div>
</div>

<div id="scene2">
    <div id="voiceText"></div>
</div>

<audio id="music" loop>
  <source src="zulfe.mp3" type="audio/mpeg">
</audio>

<script>
const messages = [
"I don’t know what’s on your mind…",
"But I can feel something is a little off.",
"You don’t have to explain anything.",
"Just know… you matter a lot.",
"And your smile? Yeah… it’s important 😊"
];

let index = 0;

function typeEffect(text, element, speed = 40) {
    element.innerHTML = "";
    let i = 0;
    let timer = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(timer);
    }, speed);
}

const textEl = document.getElementById("text");
typeEffect(messages[0], textEl);

function nextMessage() {
    if(index === 0){
        document.getElementById("music").play();
    }

    index++;
    if (index < messages.length) {
        typeEffect(messages[index], textEl);
    } else {
        startScene2();
    }
}

// 🎬 cinematic transition
function startScene2() {
    document.body.style.opacity = "0";

    setTimeout(() => {
        document.getElementById("scene1").style.display = "none";
        document.getElementById("scene2").style.display = "flex";
        document.body.style.opacity = "1";

        voiceEffect();
        createStars();
    }, 1500);
}

// 🎤 voice-style typing
const voiceLines = [
"Hey…",
"I still don’t know what’s bothering you.",
"And maybe I don’t need to.",
"",
"But if things feel heavy…",
"you don’t have to carry it alone.",
"",
"And yeah…",
"I just didn’t like seeing you not smile 🙂",
"",
"Just… don’t forget to smile sometimes 🙂 I’ll be back in a week—there’s something I really want to do. Take care 🤝🪷;

function voiceEffect() {
    let i = 0;
    let box = document.getElementById("voiceText");

    function nextLine() {
        if (i >= voiceLines.length) return;

        let p = document.createElement("p");
        p.innerHTML = "";
        box.appendChild(p);

        let text = voiceLines[i];
        let j = 0;

        let typer = setInterval(() => {
            p.innerHTML += text[j];
            j++;
            if (j >= text.length) {
                clearInterval(typer);
                i++;
                setTimeout(nextLine, 800);
            }
        }, 35);
    }

    nextLine();
}

// ⭐ stars
function createStars() {
    for(let i=0;i<80;i++){
        let star=document.createElement("div");
        star.className="star";
        star.style.top=Math.random()*100+"vh";
        star.style.left=Math.random()*100+"vw";
        document.body.appendChild(star);
    }
}
</script>

</body>
</html>
